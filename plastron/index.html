<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>plastron · rheophile.ca</title>
  <meta name="description" content="plastron — a polyglot spreadsheet in a single HTML file, embedded on rheophile.ca." />
  <link rel="canonical" href="https://rheophile.ca/plastron/" />
  <style>
    :root{ --bg:#09090b; --line:rgba(255,255,255,.10); --ink:#e4e4e7; --muted:#a1a1aa; --teal:#2dd4bf; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
      font-family:'Space Grotesk',Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{display:flex;flex-direction:column}
    .bar{flex:0 0 auto;display:flex;align-items:center;gap:12px;height:48px;padding:0 16px;
      border-bottom:1px solid var(--line);background:rgba(9,9,11,.95);backdrop-filter:blur(8px)}
    .mark{width:26px;height:26px;border-radius:8px;background:rgba(45,212,191,.10);
      box-shadow:inset 0 0 0 1px rgba(45,212,191,.30);display:flex;align-items:center;justify-content:center;
      color:var(--teal);font-size:14px}
    a{color:inherit;text-decoration:none}
    .home{color:var(--muted);font-size:13px;font-weight:500;letter-spacing:.2px}
    .home:hover{color:var(--ink)}
    .home b{color:var(--ink)}
    .sep{color:#3f3f46}
    .spacer{flex:1}
    .ext{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
      border:1px solid var(--line);border-radius:999px;padding:5px 12px;transition:.15s}
    .ext:hover{background:rgba(255,255,255,.05);color:var(--ink)}
    iframe{flex:1 1 auto;width:100%;border:0;background:#fff}
    noscript{display:block;padding:16px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="bar">
    <a class="home" href="/"><span class="mark">🐢</span></a>
    <a class="home" href="/">rheophile10 <span class="sep">/</span> <b>plastron</b></a>
    <span class="spacer"></span>
    <a class="ext" href="https://plastron.ca/" target="_blank" rel="noopener">open standalone ↗</a>
  </div>
  <iframe id="frame" title="plastron — polyglot spreadsheet"
    referrerpolicy="no-referrer-when-downgrade"
    allow="clipboard-read; clipboard-write; fullscreen"></iframe>
  <noscript>This page embeds <a href="https://plastron.ca/">plastron.ca</a>. Enable JavaScript, or open it directly.</noscript>
  <script>
    // Pass a share-link hash straight through: rheophile.ca/plastron/#f=... -> plastron.ca/#f=...
    document.getElementById('frame').src = 'https://plastron.ca/' + (location.hash || '');
  </script>
</body>
</html>
