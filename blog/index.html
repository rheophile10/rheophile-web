<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:image:width" content="1200">

  <meta name="twitter:creator" content="@rheophile10">
  <meta name="twitter:title" content="Blog — rheophile.ca">
  <meta name="twitter:description" content="Notes on building plastron and other reactive, offline-first tools in the open.">
  <meta name="twitter:image" content="https://rheophile.ca/assets/og-card.png">
  <link rel="alternate" type="application/rss+xml" title="rheophile.ca dev log" href="https://rheophile.ca/feed.xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐢</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');

    body { font-family: 'Inter', system-ui, sans-serif; }
    .display { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; }
    .section-header { font-size: 2rem; line-height: 1.1; letter-spacing: -.025em; }

    :focus-visible {
      outline: 2px solid #14b8a6;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .skip-link {
      position: absolute; left: 0.5rem; top: -3rem; z-index: 100;
      background: #14b8a6; color: #09090b; padding: 0.5rem 1rem;
      border-radius: 0 0 0.5rem 0.5rem; font-weight: 600; font-size: 0.875rem;
      transition: top 0.15s ease;
    }
    .skip-link:focus { top: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 selection:bg-teal-500/30">
  <a href="#content" class="skip-link">Skip to content</a>

  <!-- NAV -->
  <nav class="sticky top-0 z-50 border-b border-white/10 bg-zinc-950/95 backdrop-blur-lg">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 no-underline text-inherit" aria-label="rheophile10 — home">
        <div class="w-8 h-8 rounded-xl bg-teal-500/10 flex items-center justify-center ring-1 ring-inset ring-teal-500/30">
          <span class="text-xl leading-none mt-px" aria-hidden="true">🐸</span>
        </div>
        <div>
          <div class="font-semibold tracking-tighter text-xl">rheophile10</div>
          <div class="text-[10px] text-zinc-500 -mt-1">rheophile.ca</div>
        </div>
      </a>
      <div class="flex items-center gap-6 text-sm">
        <a href="/#projects" class="text-zinc-400 hover:text-white transition-colors">Projects</a>
        <a href="/blog/" class="text-teal-400">Blog</a>
        <a href="/feed.xml" class="text-zinc-500 hover:text-teal-400 transition-colors" aria-label="RSS feed">RSS</a>
      </div>
    </div>
  </nav>

  <main id="content" class="max-w-5xl mx-auto px-6 pt-14 pb-20">
    <header class="mb-10">
      <div class="text-xs uppercase tracking-[2px] text-teal-400 font-medium">Writing</div>
      <h1 class="section-header display font-semibold tracking-tighter mt-1">Dev log</h1>
      <p class="mt-3 max-w-xl text-zinc-400">
        Notes on building plastron and other reactive, offline-first tools in the open.
        Filter by tag, or <a href="/feed.xml" class="text-teal-400 hover:text-teal-300 transition">subscribe via RSS</a>.
      </p>
    </header>

    <!-- Tag filter -->
    <div id="tag-filter" class="flex flex-wrap gap-2 mb-8" role="group" aria-label="Filter posts by tag">
      <!-- Populated by JS -->
    </div>

    <!-- Posts -->
    <div class="grid md:grid-cols-2 gap-4" id="blog-index-grid">
      <!-- Populated by JS -->
    </div>
  </main>

  <footer class="border-t border-white/10 py-8">
    <div class="max-w-5xl mx-auto px-6 text-xs text-zinc-500 flex flex-col md:flex-row gap-y-2 items-center justify-between">
      <div>© Rheophile Corp. · rheophile10</div>
      <div class="flex items-center gap-x-5">
        <a href="/" class="hover:text-zinc-300 transition">Home</a>
        <span class="text-white/10">·</span>
        <a href="/feed.xml" class="hover:text-zinc-300 transition">RSS</a>
        <span class="text-white/10">·</span>
        <a href="https://github.com/rheophile10" class="hover:text-zinc-300 transition">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="/assets/blog-ui.js"></script>
  <script>
    window.onload = () => BlogUI.renderBlogIndex('blog-index-grid', 'tag-filter');
  </script>
</body>
</html>
