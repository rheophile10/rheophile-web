<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 64px 88px 96px;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 32%, rgba(20, 184, 166, 0.14) 0%, transparent 68%),
        radial-gradient(ellipse 45% 35% at 82% 78%, rgba(20, 184, 166, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .grid {
      position: absolute;
      inset: 0;
      opacity: 0.045;
      background-image:
        linear-gradient(rgba(163,163,172,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(163,163,172,0.5) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    .brand {
      font-size: 92px;
      line-height: 1;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 28px rgba(168, 255, 0, 0.22));
    }
    .label {
      font-size: 17px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2dd4bf;
      font-weight: 500;
      margin-bottom: 14px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 54px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.08;
      text-align: center;
      max-width: 1000px;
    }
    .excerpt {
      font-size: 23px;
      color: #a1a1aa;
      margin-top: 18px;
      text-align: center;
      line-height: 1.45;
      max-width: 900px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .footer {
      position: absolute;
      bottom: 52px;
      left: 88px;
      right: 88px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-size: 19px;
      color: #71717a;
    }
    .tags { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .url span { color: #14b8a6; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="brand">{{EMOJI}}</div>
  <div class="label">Dev log · {{DATE}}</div>
  <h1>{{TITLE}}</h1>
  <p class="excerpt">{{EXCERPT}}</p>
  <div class="footer">
    <span class="tags">{{TAGS}}</span>
    <div class="url">rheophile<span>.ca</span></div>
  </div>
</body>
</html>
